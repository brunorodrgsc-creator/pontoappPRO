function gerarPDF(textoRelatorio, perfil, mes, MONTHS) {
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
  var W = 210, margin = 14, y = 20, lh = 6;

  function newPage() { doc.addPage(); y = 20; }
  function check() { if (y > 270) newPage(); }

  // Header
  doc.setFillColor(13,13,13);
  doc.rect(0, 0, W, 28, "F");
  doc.setFillColor(201,168,76);
  doc.roundedRect(margin, 6, 16, 16, 2, 2, "F");
  doc.setTextColor(13,13,13);
  doc.setFontSize(11);
  doc.setFont("helvetica","bold");
  doc.text("PT", margin+8, 17, {align:"center"});
  doc.setTextColor(201,168,76);
  doc.setFontSize(16);
  doc.text("PontoApp", margin+21, 14);
  doc.setTextColor(120,100,50);
  doc.setFontSize(7);
  doc.setFont("helvetica","normal");
  doc.text("CONTROLO DE HORAS PROFISSIONAL", margin+21, 20);
  doc.setTextColor(100,100,100);
  doc.text(new Date().toLocaleDateString("pt-PT"), W-margin, 20, {align:"right"});

  y = 36;

  // Period
  var mFim = mes.m===11 ? 0 : mes.m+1;
  var yFim = mes.m===11 ? mes.y+1 : mes.y;
  doc.setTextColor(201,168,76);
  doc.setFontSize(13);
  doc.setFont("helvetica","bold");
  doc.text("RELATÓRIO DE ASSIDUIDADE", W/2, y, {align:"center"});
  y += 6;
  doc.setTextColor(100,100,100);
  doc.setFontSize(9);
  doc.setFont("helvetica","normal");
  doc.text("21 "+MONTHS[mes.m]+" – 20 "+MONTHS[mFim]+" "+yFim, W/2, y, {align:"center"});
  y += 10;

  // Worker box
  if (perfil.nome || perfil.empresa) {
    doc.setFillColor(245,245,240);
    doc.roundedRect(margin, y, W-margin*2, 18, 2, 2, "F");
    doc.setFillColor(201,168,76);
    doc.rect(margin, y, 2, 18, "F");
    doc.setTextColor(30,30,30);
    doc.setFont("helvetica","bold");
    doc.setFontSize(8);
    doc.text(perfil.nome||"", margin+6, y+7);
    doc.setFont("helvetica","normal");
    doc.setTextColor(100,100,100);
    doc.text((perfil.empresa||"")+(perfil.cargo?" | "+perfil.cargo:""), margin+6, y+14);
    y += 24;
  }

  // Parse lines
  var lines = textoRelatorio.split("\n");
  for (var i=0; i<lines.length; i++) {
    var line = lines[i];
    if (!line || !line.trim()) continue;
    if (/^[═╔╚║╗╝─╠╣]+$/.test(line.trim())) continue;
    check();

    // Section headers
    if (line.trim()==="REGISTOS DIÁRIOS" || line.trim()==="RESUMO" || line.trim()==="VENCIMENTO ESTIMADO") {
      y += 3;
      doc.setFillColor(235,230,220);
      doc.rect(margin, y-4, W-margin*2, 8, "F");
      doc.setTextColor(150,110,30);
      doc.setFont("helvetica","bold");
      doc.setFontSize(8);
      doc.text(line.trim(), margin+3, y+1);
      doc.setFont("helvetica","normal");
      y += 8;
      continue;
    }

    // Day entries (e.g. "Seg 23 — Ent:07:30 Saí:16:00 | 07:30 (+00:30)")
    var dashIdx = line.indexOf("—");
    if (dashIdx > 0 && dashIdx < 12) {
      var dayPart = line.substring(0, dashIdx).trim();
      var rest = line.substring(dashIdx+1).trim();
      var saldoMatch = rest.match(/\(([+-][0-9:]+)\)/);
      var saldo = saldoMatch ? saldoMatch[1] : null;
      var mainPart = rest.replace(/\s*\([+-][0-9:]+\)/,"").trim();

      doc.setTextColor(120,120,120);
      doc.setFontSize(8);
      doc.text(dayPart, margin+2, y);
      doc.setTextColor(30,30,30);
      doc.text(mainPart.substring(0,55), margin+22, y);
      if (saldo) {
        if (saldo[0]==="+") doc.setTextColor(39,174,96);
        else doc.setTextColor(231,76,60);
        doc.text(saldo, W-margin, y, {align:"right"});
      }
      doc.setTextColor(30,30,30);
      y += lh;
      continue;
    }

    // Key: value lines
    var colonIdx = line.indexOf(":");
    if (colonIdx > 1 && colonIdx < 35) {
      var key = line.substring(0, colonIdx).trim();
      var val = line.substring(colonIdx+1).trim();
      if (!val) continue;
      doc.setFontSize(8);
      doc.setTextColor(120,120,120);
      doc.setFont("helvetica","normal");
      doc.text(key, margin+2, y);
      if (val.startsWith("+")) doc.setTextColor(39,174,96);
      else if (val.startsWith("-") && val.length>1) doc.setTextColor(231,76,60);
      else if (key.trim()==="LÍQUIDO ESTIMADO") { doc.setTextColor(201,168,76); doc.setFont("helvetica","bold"); }
      else doc.setTextColor(30,30,30);
      doc.text(val, W-margin, y, {align:"right"});
      doc.setFont("helvetica","normal");
      doc.setTextColor(30,30,30);
      y += lh;
      continue;
    }

    // Generic
    doc.setTextColor(100,100,100);
    doc.setFontSize(7);
    doc.text(line.substring(0,90), margin+2, y);
    y += lh-1;
  }

  // Footer
  var fY = 287;
  doc.setFillColor(13,13,13);
  doc.rect(0, fY-4, W, 14, "F");
  doc.setTextColor(80,80,80);
  doc.setFontSize(7);
  doc.text("PontoApp v2.0  |  Documento gerado automaticamente", W/2, fY+3, {align:"center"});

  // Open in new tab (iOS compatible)
  var blob = doc.output("blob");
  var url = URL.createObjectURL(blob);
  window.open(url, "_blank");
  setTimeout(function(){ URL.revokeObjectURL(url); }, 30000);
}



function partilharPDF(textoRelatorio, perfil, mes, MONTHS) {
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
  
  // Generate same PDF as gerarPDF
  gerarPDF(textoRelatorio, perfil, mes, MONTHS);
  
  // Also try Web Share API for direct sharing
  setTimeout(function() {
    try {
      var jsPDF2 = window.jspdf.jsPDF;
      var doc2 = new jsPDF2({ orientation: "portrait", unit: "mm", format: "a4" });
      // rebuild doc2 with same content
      var mFim = mes.m===11 ? 0 : mes.m+1;
      var yFim = mes.m===11 ? mes.y+1 : mes.y;
      doc2.setFontSize(14);
      doc2.text("PontoApp - Relatorio " + MONTHS[mes.m] + " " + mes.y, 14, 20);
      doc2.setFontSize(8);
      var lines = textoRelatorio.split("\n");
      var y = 30;
      lines.forEach(function(line) {
        if (y > 270) { doc2.addPage(); y = 20; }
        if (line.trim()) { doc2.text(line.substring(0,90), 14, y); y += 5; }
      });
      var blob = doc2.output("blob");
      var file = new File([blob], "relatorio_ponto.pdf", { type: "application/pdf" });
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({
          title: "Relatório PontoApp",
          text: "Relatório de " + MONTHS[mes.m] + " " + mes.y,
          files: [file]
        }).catch(function(e) { console.log("Share cancelled"); });
      } else {
        // Fallback - open PDF
        var url = URL.createObjectURL(blob);
        window.open(url, "_blank");
        setTimeout(function(){ URL.revokeObjectURL(url); }, 30000);
      }
    } catch(e) { console.error("partilhar error:", e); }
  }, 500);
}
