          doc.setTextColor(30,30,30); y+=lh; continue;

        var colonIdx=line.indexOf(":");

      doc.setFillColor(13,13,13); doc.rect(0,287-4,W,14,"F");
      doc.setTextColor(80,80,80); doc.setFontSize(7);
      doc.text("PontoApp v2.0 | Documento gerado automaticamente", W/2, 290, {align:"center"});
      var blob = doc.output("blob");
      var url = URL.createObjectURL(blob);
      window.open(url, "_blank");
      setTimeout(function(){ URL.revokeObjectURL(url); }, 30000);
    }

    function partilharPDF(textoRelatorio, perfil, mes, MONTHS) {
      gerarPDF(textoRelatorio, perfil, mes, MONTHS);
    }

  <script>
    // Bible verses
    var VERSES = [
  {r:"Salmos 1:1",t:"Bem-aventurado o homem que não anda no conselho dos ímpios, nem se detém no caminho dos pecadores."},
  {r:"Salmos 3:3",t:"Tu, porém, Senhor, és o escudo que me rodeia, és a minha glória e o que exalta a minha cabeça."},
  {r:"Salmos 4:8",t:"Em paz me deito e logo adormeço, pois só tu, Senhor, me fazes habitar em segurança."},
  {r:"Salmos 5:3",t:"Senhor, de manhã ouves a minha voz; de manhã apresento a ti a minha oração e fico esperando."},
  {r:"Salmos 8:1",t:"Ó Senhor, Senhor nosso, quão admirável é o teu nome em toda a terra!"},
  {r:"Salmos 9:1",t:"Louvar-te-ei, Senhor, de todo o meu coração; contarei todas as tuas maravilhas."},
  {r:"Salmos 16:8",t:"Tenho posto sempre o Senhor diante de mim; estando ele à minha mão direita, não serei abalado."},
  {r:"Salmos 16:11",t:"Tu me farás ver a senda da vida; na tua presença há plenitude de alegria."},
  {r:"Salmos 18:2",t:"O Senhor é a minha rocha, a minha fortaleza e o meu libertador; o meu Deus, o meu rochedo em quem me refúgio."},
  {r:"Salmos 18:29",t:"Pois contigo desfaço hostes armadas; com o auxílio do meu Deus transpondo muros."},
  {r:"Salmos 18:32",t:"É Deus quem me cinge de força e torna perfeito o meu caminho."},
  {r:"Salmos 19:14",t:"Sejam aceites as palavras da minha boca e a meditação do meu coração perante ti, Senhor, rocha minha e redentor meu."},
  {r:"Salmos 20:4",t:"Conceda-te o desejo do teu coração e realize todos os teus planos."},
  {r:"Salmos 21:1",t:"O rei se alegra no teu poder, Senhor; quão imensamente se regozija na tua salvação!"},
  {r:"Salmos 22:24",t:"Pois não desprezou nem abominou a aflição do aflito; não escondeu dele o seu rosto, mas o ouviu quando clamou."},
  {r:"Salmos 23:1",t:"O Senhor é o meu pastor, e nada me faltará."},
  {r:"Salmos 23:4",t:"Ainda que eu andasse pelo vale da sombra da morte, não temeria mal nenhum, porque tu estás comigo."},
  {r:"Salmos 24:1",t:"Do Senhor é a terra e tudo o que nela há, o mundo e os que nele habitam."},
  {r:"Salmos 25:4",t:"Mostra-me, Senhor, os teus caminhos; ensina-me as tuas veredas."},
  {r:"Salmos 25:9",t:"Aos mansos ele guia no que é justo, e aos humildes ensina o seu caminho."},
  {r:"Salmos 27:1",t:"O Senhor é a minha luz e a minha salvação; a quem temerei? O Senhor é a força da minha vida; a quem me recearei?"},
  {r:"Salmos 27:4",t:"Uma coisa pedi ao Senhor, e a buscarei: que eu possa morar na casa do Senhor todos os dias da minha vida."},
  {r:"Salmos 27:14",t:"Espera no Senhor, anima-te, e ele fortalecerá o teu coração. Sim, espera no Senhor!"},
  {r:"Salmos 28:7",t:"O Senhor é a minha força e o meu escudo; nele confiou o meu coração e fui socorrido."},
  {r:"Salmos 29:11",t:"O Senhor dará força ao seu povo; o Senhor abençoará o seu povo com a paz."},
  {r:"Salmos 30:5",t:"Porque a sua ira dura um momento, mas no seu favor há vida; o choro pode durar uma noite, mas a alegria vem pela manhã."},
  {r:"Salmos 31:3",t:"Pois tu és a minha rocha e a minha fortaleza; pelo amor do teu nome, guia-me e conduz-me."},
  {r:"Salmos 31:24",t:"Sede fortes e animai o vosso coração, todos vós que esperais no Senhor!"},
  {r:"Salmos 32:8",t:"Instruir-te-ei e ensinar-te-ei o caminho que deves seguir; sobre ti fixarei os meus olhos e te darei conselho."},
  {r:"Salmos 33:20",t:"A nossa alma espera no Senhor; ele é o nosso auxílio e o nosso escudo."},
  {r:"Salmos 34:4",t:"Busquei o Senhor e ele me ouviu, e me livrou de todos os meus temores."},
  {r:"Salmos 34:7",t:"O anjo do Senhor acampa ao redor dos que o temem e os livra."},
  {r:"Salmos 34:8",t:"Provai e vede que o Senhor é bom; bem-aventurado o homem que nele se refúgia."},
  {r:"Salmos 34:17",t:"Os justos clamam e o Senhor os ouve; e os livra de todas as suas angústias."},
  {r:"Salmos 34:18",t:"O Senhor está perto dos que têm o coração quebrantado e salva os de espírito contrito."},
  {r:"Salmos 36:7",t:"Quão preciosa é a tua graça, ó Deus! Os filhos dos homens se abrigam à sombra das tuas asas."},
  {r:"Salmos 37:3",t:"Confia no Senhor e pratica o bem; habitarás na terra e com verdade te apascentarás."},
  {r:"Salmos 37:4",t:"Deleita-te também no Senhor, e ele te concederá os desejos do teu coração."},
  {r:"Salmos 37:5",t:"Confia o teu caminho ao Senhor; confia nele, e ele tudo fará."},
  {r:"Salmos 37:7",t:"Aquieta-te no Senhor e espera com paciência por ele; não te incomodes com o que prospera no seu caminho."},
  {r:"Salmos 37:23",t:"Os passos do homem bom são confirmados pelo Senhor, e ele se deleita no seu caminho."},
  {r:"Salmos 37:24",t:"Ainda que caia, não ficará prostrado, pois o Senhor o sustém com a sua mão."},
  {r:"Salmos 38:15",t:"Porque em ti, Senhor, espero; tu me ouvirás, Senhor meu Deus."},
  {r:"Salmos 40:1",t:"Esperando, esperei no Senhor; e ele se inclinou para mim e ouviu o meu clamor."},
  {r:"Salmos 40:3",t:"Pôs em minha boca um novo cântico, um hino de louvor ao nosso Deus."},
  {r:"Salmos 41:3",t:"O Senhor o sustentará na cama do padecimento; na sua enfermidade lhe farás toda a cama."},
  {r:"Salmos 42:5",t:"Por que estás abatida, ó minha alma? E por que te perturba dentro de mim? Espera em Deus, pois ainda o louvarei."},
  {r:"Salmos 42:11",t:"Espera em Deus, pois ainda o louvarei, a ele, a salvação do meu rosto e o meu Deus."},
  {r:"Salmos 43:3",t:"Envia a tua luz e a tua verdade; sejam estas as minhas guias."},
  {r:"Salmos 45:11",t:"O rei desejará a tua formosura, porque ele é o teu Senhor; e inclinar-te-ás a ele."},
  {r:"Salmos 46:1",t:"Deus é o nosso refúgio e força, socorro bem presente nas tribulações."},
  {r:"Salmos 46:10",t:"Aquietai-vos e sabei que eu sou Deus; serei exaltado entre as nações, serei exaltado na terra."},
  {r:"Salmos 47:1",t:"Batei palmas, todos os povos; jubilai a Deus com voz de alegria!"},
  {r:"Salmos 48:14",t:"Pois este Deus é o nosso Deus eternamente e para sempre; ele nos guiará até a morte."},
  {r:"Salmos 50:15",t:"Invoca-me no dia da angústia; eu te livrarei e tu me glorificarás."},
  {r:"Salmos 51:10",t:"Cria em mim, ó Deus, um coração puro, e renova dentro de mim um espírito reto."},
  {r:"Salmos 52:8",t:"Mas eu sou como a oliveira verde na casa de Deus; confio na misericórdia de Deus eternamente e para sempre."},
  {r:"Salmos 54:4",t:"Eis que Deus é o meu auxílio; o Senhor é o sustentador da minha alma."},
  {r:"Salmos 55:22",t:"Lança sobre o Senhor o teu peso, e ele te susterá; nunca permitirá que o justo seja abalado."},
  {r:"Salmos 56:3",t:"No dia em que tiver medo, porei em ti a minha confiança."},
  {r:"Salmos 56:11",t:"Em Deus confio; não temerei. Que me pode fazer o homem?"},
  {r:"Salmos 57:7",t:"O meu coração está preparado, ó Deus, o meu coração está preparado; cantarei e entoarei louvores."},
  {r:"Salmos 59:16",t:"Mas eu cantarei o teu poder; sim, de manhã cantarei a tua misericórdia."},
  {r:"Salmos 61:2",t:"Do fim da terra clamarei a ti, quando o meu coração desfalece; conduze-me à rocha que é mais alta do que eu."},
  {r:"Salmos 62:1",t:"De Deus somente procede a minha salvação; dele vem o meu auxílio."},
  {r:"Salmos 62:5",t:"Aquieta-te, ó minha alma, somente em Deus, pois dele vem a minha esperança."},
  {r:"Salmos 62:8",t:"Confiai nele em todo o tempo, ó povo; derramai diante dele o vosso coração; Deus é o nosso refúgio."},
  {r:"Salmos 63:1",t:"Ó Deus, tu és o meu Deus; de madrugada te busco; a minha alma tem sede de ti."},
  {r:"Salmos 63:3",t:"Porque a tua benignidade é melhor do que a vida; os meus lábios te louvarão."},
  {r:"Salmos 65:4",t:"Bem-aventurado aquele que tu escolhes e fazes chegar perto de ti, para que habite nos teus átrios."},
  {r:"Salmos 66:19",t:"Mas em verdade Deus me ouviu; atendeu à voz da minha oração."},
  {r:"Salmos 68:19",t:"Bendito seja o Senhor que de dia em dia leva o nosso peso; o Deus que é a nossa salvação."},
  {r:"Salmos 71:5",t:"Pois tu és a minha esperança, Senhor Deus; tu és a minha confiança desde a minha juventude."},
  {r:"Salmos 71:14",t:"Mas eu esperarei continuamente e ainda te louvarei cada vez mais."},
  {r:"Salmos 72:18",t:"Bendito seja o Senhor Deus, o Deus de Israel, o único que faz maravilhas!"},
  {r:"Salmos 73:26",t:"A minha carne e o meu coração desfalecem; mas Deus é a força do meu coração e a minha porção para sempre."},
  {r:"Salmos 84:11",t:"Pois o Senhor Deus é sol e escudo; o Senhor dará graça e glória; não retirará o bem aos que andam retamente."},
  {r:"Salmos 86:5",t:"Pois tu, Senhor, és bom e pronto a perdoar, e abundante em misericórdia para com todos os que te invocam."},
  {r:"Salmos 89:1",t:"As misericórdias do Senhor cantarei perpetuamente; de geração em geração farei conhecida a tua fidelidade."},
  {r:"Salmos 90:14",t:"Farta-nos cedo com a tua misericórdia, para que cantemos e nos alegremos todos os nossos dias."},
  {r:"Salmos 91:1",t:"Aquele que habita no esconderijo do Altíssimo, e descansa à sombra do Onipotente."},
  {r:"Salmos 91:2",t:"Direi ao Senhor: Ele é o meu refúgio e a minha fortaleza, o meu Deus em quem confio."},
  {r:"Salmos 91:11",t:"Pois aos seus anjos dará ordens a teu respeito, para te guardarem em todos os teus caminhos."},
  {r:"Salmos 92:1",t:"Como é bom louvar ao Senhor, e cantar louvores ao teu nome, ó Altíssimo!"},
  {r:"Salmos 94:18",t:"Quando eu disser: O meu pé escorrega; a tua misericórdia, Senhor, me sustentará."},
  {r:"Salmos 95:6",t:"Vinde, adoremos e prostremo-nos; ajoelhemos diante do Senhor que nos fez."},
  {r:"Salmos 96:2",t:"Cantai ao Senhor, bendizei o seu nome; anunciai de dia em dia a sua salvação."},
  {r:"Salmos 100:4",t:"Entrai pelas suas portas com ações de graças e nos seus átrios com louvor; rendei-lhe graças e bendizei o seu nome."},
  {r:"Salmos 100:5",t:"Pois o Senhor é bom; a sua misericórdia é eterna, e a sua fidelidade dura de geração em geração."},
  {r:"Salmos 103:1",t:"Bendize, ó minha alma, ao Senhor, e tudo o que há em mim bendiga o seu santo nome."},
  {r:"Salmos 103:2",t:"Bendize, ó minha alma, ao Senhor, e não te esqueças de nenhum dos seus benefícios."},
  {r:"Salmos 103:8",t:"O Senhor é misericordioso e compassivo, longânimo e abundante em graça."},
  {r:"Salmos 103:12",t:"Assim como o oriente está longe do ocidente, assim ele afastou de nós as nossas transgressões."},
  {r:"Salmos 104:33",t:"Cantarei ao Senhor enquanto viver; cantarei louvores ao meu Deus enquanto existir."},
  {r:"Salmos 107:1",t:"Rendei graças ao Senhor, porque ele é bom, porque a sua misericórdia dura para sempre."},
  {r:"Salmos 107:9",t:"Pois saciou a alma sedenta e encheu de bem a alma faminta."},
  {r:"Salmos 118:1",t:"Rendei graças ao Senhor, porque ele é bom, porque a sua misericórdia dura para sempre."},
  {r:"Salmos 118:6",t:"O Senhor está do meu lado; não temerei. Que me pode fazer o homem?"},
  {r:"Salmos 118:14",t:"O Senhor é a minha força e o meu cântico, e tem-me sido por salvação."},
  {r:"Salmos 118:24",t:"Este é o dia que o Senhor fez; regozijemo-nos e alegremo-nos nele."},
  {r:"Salmos 119:11",t:"Escondi a tua palavra no meu coração, para não pecar contra ti."},
  {r:"Salmos 119:105",t:"A tua palavra é lâmpada que ilumina os meus passos e luz que clareia o meu caminho."},
  {r:"Salmos 119:114",t:"Tu és o meu esconderijo e o meu escudo; na tua palavra espero."},
  {r:"Salmos 119:165",t:"Muita paz têm os que amam a tua lei, e para eles não há tropeço."},
  {r:"Salmos 121:1",t:"Elevo os meus olhos para os montes: de onde me virá o socorro?"},
  {r:"Salmos 121:2",t:"O meu socorro vem do Senhor, que fez os céus e a terra."},
  {r:"Salmos 121:3",t:"Não deixará vacilar o teu pé; não dormitará aquele que te guarda."},
  {r:"Salmos 121:7",t:"O Senhor te preservará de todo o mal; preservará a tua alma."},
  {r:"Salmos 121:8",t:"O Senhor guardará a tua saída e a tua entrada, desde agora e para sempre."},
  {r:"Salmos 123:2",t:"Como os olhos dos servos estão fixos nas mãos dos seus senhores, assim os nossos olhos estão no Senhor nosso Deus."},
  {r:"Salmos 124:8",t:"O nosso socorro está no nome do Senhor, que fez os céus e a terra."},
  {r:"Salmos 126:3",t:"O Senhor tem feito grandes coisas por nós, e por isso estamos alegres."},
  {r:"Salmos 127:1",t:"Se o Senhor não edificar a casa, em vão trabalham os que a edificam."},
  {r:"Salmos 128:1",t:"Bem-aventurado todo aquele que teme ao Senhor e anda nos seus caminhos."},
  {r:"Salmos 130:5",t:"Eu espero no Senhor; a minha alma espera, e na sua palavra ponho a minha esperança."},
  {r:"Salmos 136:1",t:"Rendei graças ao Senhor, porque ele é bom, porque a sua misericórdia dura para sempre."},
  {r:"Salmos 138:3",t:"No dia em que eu clamei, tu me respondeste; fortaleceste-me com força na minha alma."},
  {r:"Salmos 138:7",t:"Se eu andar no meio da tribulação, tu me revigorará; estenderás a tua mão contra a ira dos meus inimigos."},
  {r:"Salmos 138:8",t:"O Senhor aperfeiçoará o que me diz respeito; a tua misericórdia, Senhor, dura para sempre."},
  {r:"Salmos 139:14",t:"Graças te dou pelo modo por que fui feito, tão admirável e maravilhoso. São maravilhosas as tuas obras!"},
  {r:"Salmos 139:23",t:"Esquadrinha-me, ó Deus, e conhece o meu coração; prova-me e conhece os meus pensamentos."},
  {r:"Salmos 143:8",t:"Faze-me ouvir de manhã a tua misericórdia, porque em ti confio; faze-me conhecer o caminho que devo seguir."},
  {r:"Salmos 143:10",t:"Ensina-me a fazer a tua vontade, porque tu és o meu Deus; o teu bom Espírito me guiará na terra plana."},
  {r:"Salmos 145:8",t:"O Senhor é clemente e misericordioso, longânimo e de grande benignidade."},
  {r:"Salmos 145:14",t:"O Senhor ampara todos os que caem e levanta todos os abatidos."},
  {r:"Salmos 145:18",t:"O Senhor está perto de todos os que o invocam, de todos os que o invocam em verdade."},
  {r:"Salmos 146:5",t:"Feliz aquele cujo auxílio é o Deus de Jacó, cuja esperança está no Senhor seu Deus."},
  {r:"Salmos 147:3",t:"Ele sara os de coração quebrado e lhes curta as feridas."},
  {r:"Salmos 149:4",t:"Porque o Senhor se agrada do seu povo; ele adorna com salvação os mansos."},
  {r:"Salmos 150:6",t:"Todo ser que respira louve ao Senhor! Aleluia!"},
  {r:"Provérbios 1:7",t:"O temor do Senhor é o princípio da sabedoria; os loucos desprezam a sabedoria e a instrução."},
  {r:"Provérbios 2:6",t:"Pois o Senhor dá a sabedoria; da sua boca procedem o conhecimento e o entendimento."},
  {r:"Provérbios 3:5",t:"Confia no Senhor de todo o teu coração e não te estribes no teu próprio entendimento."},
  {r:"Provérbios 3:6",t:"Reconhece-o em todos os teus caminhos, e ele endireitará as tuas veredas."},
  {r:"Provérbios 3:7",t:"Não sejas sábio a teus próprios olhos; teme ao Senhor e aparta-te do mal."},
  {r:"Provérbios 3:11",t:"Filho meu, não rejeites a disciplina do Senhor, nem te fatigues com a sua repreensão."},
  {r:"Provérbios 3:12",t:"Porque o Senhor repreende a quem ama, assim como o pai ao filho a quem quer bem."},
  {r:"Provérbios 3:24",t:"Quando te deitares, não terás medo; sim, te deitarás e o teu sono será suave."},
  {r:"Provérbios 4:7",t:"A sabedoria é a coisa primordial; adquire pois a sabedoria; sim, com tudo o que possuis adquire o entendimento."},
  {r:"Provérbios 4:18",t:"Mas a senda dos justos é como a luz da aurora, que vai brilhando mais e mais até ser dia perfeito."},
  {r:"Provérbios 4:23",t:"Sobre tudo o que se deve guardar, guarda o teu coração, porque dele procedem as saídas da vida."},
  {r:"Provérbios 6:22",t:"Quando andares, isso te guiará; quando dormires, velará sobre ti; quando acordares, falará contigo."},
  {r:"Provérbios 10:12",t:"O ódio desperta contendas, mas o amor cobre todas as transgressões."},
  {r:"Provérbios 11:14",t:"No muito conselheiro há salvação."},
  {r:"Provérbios 12:25",t:"A ansiedade no coração do homem o abate, mas a boa palavra o alegra."},
  {r:"Provérbios 13:12",t:"A esperança adiada adoece o coração, mas o desejo cumprido é árvore da vida."},
  {r:"Provérbios 14:26",t:"No temor do Senhor há forte confiança, e os seus filhos terão refúgio."},
  {r:"Provérbios 15:1",t:"A resposta branda desvia o furor, mas a palavra dura suscita a ira."},
  {r:"Provérbios 15:13",t:"O coração alegre aformoseia o rosto, mas a tristeza do coração abate o espírito."},
  {r:"Provérbios 15:15",t:"Todos os dias do aflito são maus, mas o de coração alegre tem um banquete contínuo."},
  {r:"Provérbios 16:3",t:"Confia ao Senhor as tuas obras, e os teus projetos serão estabelecidos."},
  {r:"Provérbios 16:7",t:"Quando os caminhos do homem são agradáveis ao Senhor, até os seus inimigos se reconciliam com ele."},
  {r:"Provérbios 16:9",t:"O coração do homem pondera o seu caminho, mas o Senhor lhe dirige os passos."},
  {r:"Provérbios 16:20",t:"O que dá atenção à palavra achará o bem, e o que confia no Senhor é bem-aventurado."},
  {r:"Provérbios 17:17",t:"Em todo o tempo ama o amigo, e na angústia nasce o irmão."},
  {r:"Provérbios 17:22",t:"O coração alegre é um bom remédio, mas o espírito abatido seca os ossos."},
  {r:"Provérbios 18:10",t:"O nome do Senhor é uma torre forte; o justo corre para ela e está em segurança."},
  {r:"Provérbios 18:24",t:"Há amigos que servem de ruína, mas há amigo mais chegado que um irmão."},
  {r:"Provérbios 19:21",t:"Muitos projetos há no coração do homem, mas o conselho do Senhor permanece."},
  {r:"Provérbios 20:22",t:"Não digas: Vingarei o mal. Espera no Senhor, e ele te salvará."},
  {r:"Provérbios 21:21",t:"O que busca a justiça e a misericórdia achará vida, justiça e honra."},
  {r:"Provérbios 22:4",t:"A recompensa da humildade e do temor do Senhor são as riquezas, a honra e a vida."},
  {r:"Provérbios 23:17",t:"Não inveje o teu coração os pecadores, mas tema ao Senhor todo o dia."},
  {r:"Provérbios 24:10",t:"Se te tornas covarde no dia da adversidade, a tua força é pequena."},
  {r:"Provérbios 24:16",t:"Porque o justo cai sete vezes e se levanta outra vez; mas os ímpios caem na calamidade."},
  {r:"Provérbios 25:11",t:"Como maçãs de ouro em esculturas de prata, assim é a palavra dita a seu tempo."},
  {r:"Provérbios 27:1",t:"Não te glories do dia de amanhã, pois não sabes o que ele trará."},
  {r:"Provérbios 28:20",t:"O homem fiel terá muitas bênçãos."},
  {r:"Provérbios 29:25",t:"O temor do homem arma cilada, mas o que confia no Senhor está seguro."},
  {r:"Provérbios 30:5",t:"Toda a palavra de Deus é pura; ele é escudo para os que nele se refugiam."},
  {r:"Provérbios 31:25",t:"Força e honra são o seu vestido, e ri-se do dia futuro."},
  {r:"Provérbios 31:30",t:"Enganosa é a graça e vã a beleza; mas a mulher que teme ao Senhor, essa será louvada."},
  {r:"Isaías 9:6",t:"Pois um menino nos nasceu, um filho se nos deu; o governo está sobre os seus ombros."},
  {r:"Isaías 26:3",t:"Tu guardarás em paz aquele cuja mente está firme em ti; porque ele confia em ti."},
  {r:"Isaías 26:4",t:"Confiai no Senhor perpetuamente, porque no Senhor Deus há força eterna."},
  {r:"Isaías 30:21",t:"Os teus ouvidos ouvirão a palavra dizendo: Este é o caminho, andai por ele."},
  {r:"Isaías 33:6",t:"E será a estabilidade dos teus tempos, a força das tuas salvações, a sabedoria e o conhecimento."},
  {r:"Isaías 40:28",t:"Não sabes tu, ou não ouviste, que o Deus eterno, o Senhor, o Criador das extremidades da terra, não cança nem se fatiga?"},
  {r:"Isaías 40:29",t:"Ele dá força ao cansado, e multiplica as forças ao que não tem nenhum vigor."},
  {r:"Isaías 40:30",t:"Os jovens se cansarão e se fatigarão, e os moços cairão; mas os que esperam no Senhor renovarão as forças."},
  {r:"Isaías 40:31",t:"Os que esperam no Senhor renovarão as forças; subirão com asas como águias; correrão e não se cansarão; caminharão e não se fatigarão."},
  {r:"Isaías 41:9",t:"Tu, a quem tomei das extremidades da terra e chamei das partes mais remotas dela, e a quem disse: Tu és o meu servo."},
  {r:"Isaías 41:10",t:"Não temas, porque eu sou contigo; não te assombres, porque eu sou teu Deus; eu te fortaleço, e te ajudo, e te sustento com a minha destra fiel."},
  {r:"Isaías 41:13",t:"Pois eu, o Senhor teu Deus, te seguro pela tua mão direita; sou eu que te digo: Não temas; eu te ajudo."},
  {r:"Isaías 43:1",t:"Não temas, porque eu te remi; chamei-te pelo teu nome; tu és meu."},
  {r:"Isaías 43:2",t:"Quando passares pelas águas, estarei contigo; e pelos rios, eles não te submergirão."},
  {r:"Isaías 43:18",t:"Não vos lembreis das coisas passadas, nem considereis as antigas."},
  {r:"Isaías 43:19",t:"Eis que farei coisa nova, que está prestes a brotar; não a percebereis? Eis que porei caminho no deserto e rios no ermo."},
  {r:"Isaías 44:22",t:"Apaguei as tuas transgressões como a névoa e os teus pecados como a nuvem; volta-te para mim, porque eu te redimi."},
  {r:"Isaías 45:2",t:"Eu irei adiante de ti e endireitarei os lugares acidentados; quebrarei as portas de bronze e despedaçarei os ferrolhos de ferro."},
  {r:"Isaías 46:4",t:"Até à velhice eu serei o mesmo, e até às cãs vos sustentarei; eu o fiz, e eu vos levarei, e sustentarei e salvarei."},
  {r:"Isaías 48:17",t:"Assim diz o Senhor, o teu Redentor, o Santo de Israel: Eu sou o Senhor teu Deus, que te ensina o que é útil."},
  {r:"Isaías 49:15",t:"Pode acaso uma mulher esquecer-se do filho que ainda mama? Mas ainda que ela se esquecesse, eu não me esqueceria de ti."},
  {r:"Isaías 51:12",t:"Eu, eu sou o que vos consola; quem és tu, para que temas o homem mortal?"},
  {r:"Isaías 53:5",t:"Mas ele foi traspassado pelas nossas transgressões e moído pelas nossas iniquidades; o castigo que nos traz a paz estava sobre ele."},
  {r:"Isaías 54:10",t:"Porque os montes se retirarão e os outeiros se abalearão, mas a minha misericórdia não se retirará de ti."},
  {r:"Isaías 55:6",t:"Buscai o Senhor enquanto se pode achar; invocai-o enquanto está perto."},
  {r:"Isaías 55:8",t:"Os meus pensamentos não são os vossos pensamentos, nem os vossos caminhos os meus caminhos, diz o Senhor."},
  {r:"Isaías 57:15",t:"Assim diz o alto e sublime, que habita a eternidade, cujo nome é Santo: Habito no alto e santo lugar, e também com o contrito e abatido de espírito."},
  {r:"Isaías 58:11",t:"O Senhor te guiará continuamente, e nas securas satisfará a tua alma."},
  {r:"Isaías 60:1",t:"Levanta-te, resplandece; porque vem a tua luz, e a glória do Senhor nasce sobre ti."},
  {r:"Isaías 61:1",t:"O Espírito do Senhor está sobre mim, porque o Senhor me ungiu para pregar boas novas aos mansos."},
  {r:"Isaías 61:3",t:"Para que se lhes dê glória em vez de cinza, óleo de alegria em vez de luto."},
  {r:"Isaías 64:4",t:"Desde os tempos antigos não se ouviu, nem com ouvidos se percebeu, nem olho algum viu um Deus além de ti, que trabalha para aquele que nele espera."},
  {r:"Isaías 65:24",t:"E será que, antes que clamem, eu responderei; ainda estão falando, e eu já os terei ouvido."},
  {r:"Jeremias 1:5",t:"Antes que eu te formasse no ventre materno, eu te conheci, e antes que saísses da madre te consagrei."},
  {r:"Jeremias 17:7",t:"Bendito é o homem que confia no Senhor e cuja esperança é o Senhor."},
  {r:"Jeremias 17:8",t:"Pois será como a árvore plantada junto às águas, que estende suas raízes para o ribeiro."},
  {r:"Jeremias 29:11",t:"Pois eu bem sei os planos que tenho para vós, diz o Senhor, planos de paz e não de mal, para vos dar um futuro e uma esperança."},
  {r:"Jeremias 29:12",t:"Então me invocareis e ireis orar a mim, e eu vos ouvirei."},
  {r:"Jeremias 29:13",t:"Buscar-me-eis e me achareis, quando me buscardes de todo o vosso coração."},
  {r:"Jeremias 31:3",t:"O Senhor me apareceu desde longínquo, dizendo: Com amor eterno te amei; por isso com misericórdia te atraí."},
  {r:"Jeremias 32:17",t:"Senhor Deus! Eis que fizeste os céus e a terra com o teu grande poder e com o teu braço estendido; nada te é impossível."},
  {r:"Jeremias 32:27",t:"Eis que eu sou o Senhor, o Deus de toda a carne; haverá alguma coisa difícil demais para mim?"},
  {r:"Jeremias 33:3",t:"Clama a mim, e eu te responderei, e te anunciarei coisas grandes e ocultas que não sabes."},
  {r:"Lamentações 3:22",t:"As misericórdias do Senhor são a causa de não sermos consumidos; porque as suas misericórdias não têm fim."},
  {r:"Lamentações 3:23",t:"Renovam-se cada manhã; grande é a tua fidelidade!"},
  {r:"Lamentações 3:25",t:"Bom é o Senhor para os que esperam por ele, para a alma que o busca."},
  {r:"Mateus 5:3",t:"Bem-aventurados os pobres de espírito, porque deles é o reino dos céus."},
  {r:"Mateus 5:6",t:"Bem-aventurados os que têm fome e sede de justiça, porque eles serão fartos."},
  {r:"Mateus 5:8",t:"Bem-aventurados os puros de coração, porque eles verão a Deus."},
  {r:"Mateus 5:9",t:"Bem-aventurados os pacificadores, porque eles serão chamados filhos de Deus."},
  {r:"Mateus 5:16",t:"Assim resplandeça a vossa luz diante dos homens, para que vejam as vossas boas obras e glorifiquem a vosso Pai."},
  {r:"Mateus 6:6",t:"Tu, porém, quando orares, entra no teu quarto e, fechando a tua porta, ora a teu Pai que está em secreto."},
  {r:"Mateus 6:26",t:"Olhai para as aves do céu: não semeiam, não colhem, nem ajuntam em celeiros, e vosso Pai celestial as alimenta."},
  {r:"Mateus 6:33",t:"Mas buscai em primeiro lugar o reino de Deus e a sua justiça, e todas essas coisas vos serão acrescentadas."},
  {r:"Mateus 6:34",t:"Portanto, não vos preocupeis com o dia de amanhã, pois o dia de amanhã terá seus próprios cuidados."},
  {r:"Mateus 7:7",t:"Pedi e dar-se-vos-á; buscai e achareis; batei e abrir-se-vos-á."},
  {r:"Mateus 7:8",t:"Porque todo aquele que pede recebe; o que busca acha; e ao que bate abrir-se-lhe-á."},
  {r:"Mateus 7:11",t:"Se vós, pois, sendo maus, sabeis dar boas dádivas aos vossos filhos, quanto mais vosso Pai celestial dará bens aos que lhe pedirem?"},
  {r:"Mateus 11:28",t:"Vinde a mim, todos os que estais cansados e sobrecarregados, e eu vos aliviarei."},
  {r:"Mateus 11:29",t:"Tomai sobre vós o meu jugo, e aprendei de mim, porque sou manso e humilde de coração."},
  {r:"Mateus 11:30",t:"Porque o meu jugo é suave e o meu fardo é leve."},
  {r:"Mateus 17:20",t:"Se tiverdes fé como um grão de mostarda, direis a este monte: Passa daqui para lá, e ele passará."},
  {r:"Mateus 18:20",t:"Porque onde dois ou três estão reunidos em meu nome, ali estou eu no meio deles."},
  {r:"Mateus 19:26",t:"Para os homens isso é impossível, mas para Deus tudo é possível."},
  {r:"Mateus 21:22",t:"E tudo quanto pedirdes em oração, crendo, recebereis."},
  {r:"Mateus 28:20",t:"Eis que estou convosco todos os dias, até a consumação dos séculos."},
  {r:"Marcos 9:23",t:"Disse-lhe Jesus: Se tu podes! Tudo é possível ao que crê."},
  {r:"Marcos 10:27",t:"Para os homens é impossível, mas não para Deus; porque para Deus todas as coisas são possíveis."},
  {r:"Marcos 11:24",t:"Por isso vos digo que tudo quanto pedirdes em oração, crede que recebereis, e será assim."},
  {r:"Lucas 1:37",t:"Pois para Deus não há nada impossível."},
  {r:"Lucas 1:45",t:"Bem-aventurada a que creu, porque serão cumpridas as coisas que lhe foram ditas da parte do Senhor."},
  {r:"Lucas 10:20",t:"Alegrai-vos porque os vossos nomes estão escritos nos céus."},
  {r:"Lucas 11:9",t:"Pedi e ser-vos-á dado; buscai e achareis; batei e abrir-se-vos-á."},
  {r:"Lucas 12:7",t:"Até os cabelos da vossa cabeça estão todos contados. Não temais; valeis mais do que muitos pardais."},
  {r:"Lucas 18:27",t:"As coisas impossíveis para os homens são possíveis para Deus."},
  {r:"João 1:1",t:"No princípio era o Verbo, e o Verbo estava com Deus, e o Verbo era Deus."},
  {r:"João 3:16",t:"Porque Deus amou o mundo de tal maneira que deu o seu Filho unigênito, para que todo aquele que nele crê não pereça."},
  {r:"João 3:17",t:"Pois Deus enviou o seu Filho ao mundo, não para que condenasse o mundo, mas para que o mundo fosse salvo por ele."},
  {r:"João 8:12",t:"Jesus falou-lhes novamente, dizendo: Eu sou a luz do mundo; quem me segue não andará em trevas."},
  {r:"João 8:36",t:"Portanto, se o Filho vos libertar, sereis verdadeiramente livres."},
  {r:"João 10:10",t:"Eu vim para que tenham vida, e a tenham em abundância."},
  {r:"João 13:35",t:"Por isso todos saberão que sois meus discípulos: se tiverdes amor uns aos outros."},
  {r:"João 14:1",t:"Não se turbe o vosso coração; credes em Deus, crede também em mim."},
  {r:"João 14:6",t:"Eu sou o caminho, a verdade e a vida; ninguém vem ao Pai senão por mim."},
  {r:"João 14:13",t:"E tudo quanto pedirdes em meu nome farei, para que o Pai seja glorificado no Filho."},
  {r:"João 14:14",t:"Se pedirdes alguma coisa em meu nome, eu a farei."},
  {r:"João 14:27",t:"Deixo-vos a paz, a minha paz vos dou; não vos dou como o mundo dá. Não se turbe o vosso coração, nem se atemorize."},
  {r:"João 15:5",t:"Eu sou a videira; vós, os ramos. Quem permanece em mim, e eu nele, esse dá muito fruto."},
  {r:"João 15:7",t:"Se permanecerdes em mim, e as minhas palavras permanecerem em vós, pedireis o que quiserdes e ser-vos-á feito."},
  {r:"João 15:11",t:"Estas coisas vos tenho dito para que a minha alegria permaneça em vós e a vossa alegria seja completa."},
  {r:"João 15:13",t:"Ninguém tem maior amor do que este: dar alguém a própria vida em favor dos seus amigos."},
  {r:"João 16:33",t:"Tenho-vos dito estas coisas para que em mim tenhais paz. No mundo passais por tribulações; mas tende bom ânimo; eu venci o mundo."},
  {r:"Atos 2:28",t:"Fizeste-me conhecer os caminhos da vida; encher-me-ás de alegria com a tua presença."},
  {r:"Romanos 1:16",t:"Pois não me envergonho do evangelho, porque é o poder de Deus para a salvação de todo aquele que crê."},
  {r:"Romanos 5:1",t:"Tendo sido, pois, justificados pela fé, temos paz com Deus por nosso Senhor Jesus Cristo."},
  {r:"Romanos 5:3",t:"E não só isso, mas também nos gloriamos nas tribulações, sabendo que a tribulação produz perseverança."},
  {r:"Romanos 5:4",t:"E a perseverança, um caráter aprovado; e o caráter aprovado, esperança."},
  {r:"Romanos 5:5",t:"E a esperança não decepciona, porque o amor de Deus foi derramado em nossos corações pelo Espírito Santo."},
  {r:"Romanos 8:1",t:"Portanto, agora nenhuma condenação há para os que estão em Cristo Jesus."},
  {r:"Romanos 8:11",t:"E se o Espírito daquele que ressuscitou Jesus dentre os mortos habita em vós, vivificará também os vossos corpos mortais."},
  {r:"Romanos 8:28",t:"Sabemos que todas as coisas cooperam para o bem daqueles que amam a Deus, daqueles que são chamados segundo o seu propósito."},
  {r:"Romanos 8:31",t:"Se Deus é por nós, quem será contra nós?"},
  {r:"Romanos 8:37",t:"Em todas estas coisas somos mais do que vencedores por meio daquele que nos amou."},
  {r:"Romanos 8:38",t:"Pois estou persuadido de que nem a morte nem a vida nos poderá separar do amor de Deus."},
  {r:"Romanos 10:13",t:"Pois todo aquele que invocar o nome do Senhor será salvo."},
  {r:"Romanos 12:1",t:"Rogo-vos que vos apresenteis a Deus como sacrifício vivo, santo e agradável a Deus."},
  {r:"Romanos 12:2",t:"E não vos conformeis com este século, mas transformai-vos pela renovação da vossa mente."},
  {r:"Romanos 12:12",t:"Alegrai-vos na esperança, sede pacientes na tribulação, perseverai na oração."},
  {r:"Romanos 15:4",t:"Pois tudo que dantes foi escrito, para nosso ensino foi escrito, a fim de que pela paciência e pela consolação das Escrituras tenhamos esperança."},
  {r:"Romanos 15:13",t:"O Deus da esperança vos encha de todo gozo e paz no crer, para que abundeis em esperança pelo poder do Espírito Santo."},
  {r:"1 Coríntios 2:9",t:"Coisas que olhos não viram nem ouvidos ouviram e não subiram ao coração do homem, essas é que Deus preparou para os que o amam."},
  {r:"1 Coríntios 6:19",t:"Ou não sabeis que o vosso corpo é templo do Espírito Santo, que está em vós?"},
  {r:"1 Coríntios 10:13",t:"Não sobreveio a vós tentação que não fosse humana; mas fiel é Deus, que não permitirá que sejais tentados além das vossas forças."},
  {r:"1 Coríntios 13:4",t:"O amor é paciente, é benigno; o amor não inveja; o amor não se vangloria."},
  {r:"1 Coríntios 13:7",t:"Tudo sofre, tudo crê, tudo espera, tudo suporta."},
  {r:"1 Coríntios 13:13",t:"Agora, pois, permanecem a fé, a esperança e o amor, estes três; mas o maior destes é o amor."},
  {r:"1 Coríntios 15:10",t:"Mas pela graça de Deus sou o que sou, e a sua graça para comigo não foi em vão."},
  {r:"1 Coríntios 15:58",t:"Assim, meus amados irmãos, sede firmes e inabaláveis, sempre abundando na obra do Senhor."},
  {r:"2 Coríntios 1:3",t:"Bendito seja o Deus e Pai de nosso Senhor Jesus Cristo, o Pai das misericórdias e Deus de toda a consolação."},
  {r:"2 Coríntios 3:5",t:"Não que sejamos suficientes por nós mesmos para pensar alguma coisa como de nós mesmos; pelo contrário, a nossa suficiência vem de Deus."},
  {r:"2 Coríntios 4:8",t:"Em tudo somos atribulados, mas não angustiados; perplexos, mas não desanimados."},
  {r:"2 Coríntios 4:9",t:"Perseguidos, mas não abandonados; abatidos, mas não destruídos."},
  {r:"2 Coríntios 4:17",t:"Porque este momentâneo e leve peso de tribulação produz para nós um peso eterno de glória acima de toda a medida."},
  {r:"2 Coríntios 5:7",t:"Pois andamos por fé e não por vista."},
  {r:"2 Coríntios 5:17",t:"Se alguém está em Cristo, é nova criatura; as coisas antigas passaram; eis que tudo se fez novo."},
  {r:"2 Coríntios 9:8",t:"E Deus é poderoso para fazer que toda a graça sobreabunde em vós, a fim de que, tendo sempre tudo suficiente em tudo, superabundeis em toda a boa obra."},
  {r:"2 Coríntios 12:9",t:"A minha graça te é suficiente, porque o poder se aperfeiçoa na fraqueza."},
  {r:"2 Coríntios 12:10",t:"Por amor de Cristo me comprazo nas fraquezas, nas injúrias, nas necessidades, nas perseguições, nas angústias. Quando estou fraco, então sou forte."},
  {r:"Gálatas 2:20",t:"Estou crucificado com Cristo; e já não vivo eu, mas Cristo vive em mim."},
  {r:"Gálatas 5:22",t:"Mas o fruto do Espírito é amor, gozo, paz, longanimidade, benignidade, bondade, fidelidade."},
  {r:"Efésios 1:3",t:"Bendito seja o Deus e Pai de nosso Senhor Jesus Cristo, que nos abençoou com todas as bênçãos espirituais nos lugares celestiais em Cristo."},
  {r:"Efésios 2:8",t:"Porque pela graça sois salvos, por meio da fé; e isto não vem de vós; é dom de Deus."},
  {r:"Efésios 2:10",t:"Pois somos feitura de Deus, criados em Cristo Jesus para boas obras."},
  {r:"Efésios 3:20",t:"E àquele que é poderoso para fazer infinitamente mais do que tudo quanto pedimos ou pensamos, segundo o poder que opera em nós."},
  {r:"Efésios 4:32",t:"E sede bondosos e compassivos uns para com os outros, perdoando-vos mutuamente."},
  {r:"Efésios 6:10",t:"Quanto ao mais, sede fortes no Senhor e na força do seu poder."},
  {r:"Efésios 6:11",t:"Revesti-vos de toda a armadura de Deus, para que possais ficar firmes contra as ciladas do diabo."},
  {r:"Filipenses 1:6",t:"Tendo por certo isso mesmo, que aquele que em vós começou a boa obra a aperfeiçoará até ao dia de Cristo Jesus."},
  {r:"Filipenses 2:13",t:"Porque Deus é quem opera em vós tanto o querer como o realizar, segundo a sua boa vontade."},
  {r:"Filipenses 4:4",t:"Regozijai-vos sempre no Senhor; outra vez digo: Regozijai-vos."},
  {r:"Filipenses 4:6",t:"Não estejais inquietos por coisa alguma; antes, em tudo, pela oração e pela súplica, com ações de graças, apresentai as vossas petições a Deus."},
  {r:"Filipenses 4:7",t:"E a paz de Deus, que excede todo o entendimento, guardará os vossos corações e os vossos pensamentos em Cristo Jesus."},
  {r:"Filipenses 4:8",t:"Quanto ao mais, irmãos, tudo o que é verdadeiro, tudo o que é honesto, tudo o que é justo, pensai nestas coisas."},
  {r:"Filipenses 4:11",t:"Aprendi a estar contente em qualquer estado em que me encontre."},
  {r:"Filipenses 4:13",t:"Tudo posso naquele que me fortalece."},
  {r:"Filipenses 4:19",t:"O meu Deus suprirá todas as vossas necessidades segundo as suas riquezas em glória em Cristo Jesus."},
  {r:"Colossenses 1:13",t:"Que nos libertou do poder das trevas e nos transportou para o reino do Filho do seu amor."},
  {r:"Colossenses 3:2",t:"Pensai nas coisas do alto, não nas que são da terra."},
  {r:"Colossenses 3:15",t:"E a paz de Cristo governe em vossos corações, para a qual também fostes chamados em um só corpo; e sede agradecidos."},
  {r:"Colossenses 3:17",t:"E tudo quanto fizerdes, seja em palavras ou em obras, fazei tudo em nome do Senhor Jesus."},
  {r:"Colossenses 3:23",t:"E tudo o que fizerdes, fazei-o de coração, como ao Senhor, e não aos homens."},
  {r:"1 Tessalonicenses 5:16",t:"Regozijai-vos sempre."},
  {r:"1 Tessalonicenses 5:17",t:"Orai sem cessar."},
  {r:"1 Tessalonicenses 5:18",t:"Em tudo dai graças, pois esta é a vontade de Deus em Cristo Jesus para convosco."},
  {r:"2 Tessalonicenses 3:3",t:"Mas o Senhor é fiel; ele vos confirmará e guardará do maligno."},
  {r:"1 Timóteo 6:6",t:"Mas é grande ganho a piedade com contentamento."},
  {r:"2 Timóteo 1:7",t:"Porque Deus não nos deu o espírito de temor, mas de poder, de amor e de moderação."},
  {r:"2 Timóteo 2:1",t:"Tu, pois, filho meu, fortifica-te na graça que há em Cristo Jesus."},
  {r:"2 Timóteo 4:7",t:"Combati o bom combate, acabei a carreira, guardei a fé."},
  {r:"Tito 3:5",t:"Ele nos salvou, não por obras de justiça que houvéssemos feito, mas segundo a sua misericórdia."},
  {r:"Hebreus 4:16",t:"Cheguemo-nos, pois, com confiança ao trono da graça, para que alcancemos misericórdia e achemos graça, a fim de sermos ajudados em tempo oportuno."},
  {r:"Hebreus 6:19",t:"A qual temos por âncora da alma, segura e firme, e que penetra até o interior do véu."},
  {r:"Hebreus 10:23",t:"Conservemos firme a confissão da nossa esperança, sem vacilar, pois fiel é aquele que prometeu."},
  {r:"Hebreus 11:1",t:"Ora, a fé é a certeza de coisas que se esperam, a convicção de coisas que se não veem."},
